name: pre-match-lock

on:
  schedule:
    # Every 30 min between 14:00-23:30 UTC (covers all WC kickoff windows).
    # 20 runs/day x ~1 min each = ~20 min/day — well within free tier.
    - cron: "*/30 14-23 * 6-7 *"
  workflow_dispatch:

permissions:
  contents: write
  actions: none
  checks: none
  deployments: none
  id-token: none
  issues: none
  packages: none
  pull-requests: none
  security-events: none
  statuses: none

jobs:
  lock:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Fetch upcoming fixtures
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python -m scripts.fetch_fixtures

      - name: Fetch completed results
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python -m scripts.fetch_results

      - name: Refit model (historical + completed WC results)
        run: python -m scripts.refit_params

      - name: Lock predictions
        run: python -m scripts.predict_all_fixtures

      - name: Regenerate track record
        run: python -m scripts.generate_track_record

      - name: Simulate tournament (winner odds)
        run: python -m scripts.simulate_tournament

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            data/predictions.parquet \
            data/fixtures_2026.parquet \
            data/results.parquet \
            data/params_cache.json \
            data/tournament.json \
            reports/track_record.md \
            README.md || true
          git diff --cached --quiet || \
            git commit -m "chore: pre-match lock $(date -u +%H:%M UTC)"
          git pull --rebase origin main
          git push
