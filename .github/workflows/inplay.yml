name: inplay

on:
  # schedule disabled — WC 2026 complete
  # schedule:
  #   - cron: "*/5 14-23 * 6-7 *"
  workflow_dispatch:

# all three pipelines commit generated files to main; serialize them so
# concurrent runs stop conflicting on docs/index.html and reports/
concurrency:
  group: wc-pipeline
  cancel-in-progress: false

permissions:
  contents: write
  actions: none
  checks: none
  deployments: none
  id-token: none
  issues: none
  packages: none
  pull-requests: none
  security-events: none
  statuses: none

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Fetch live match events (SofaScore)
        run: python -m scripts.fetch_live_events

      - name: Regenerate dashboard with live data
        run: python -m scripts.generate_html_dashboard

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live_events.json docs/index.html reports/dashboard.html || true
          git diff --cached --quiet || git commit -m "chore: live update $(date -u +%H:%M UTC)"
          git pull --rebase origin main
          git push
