name: inplay

on:
  schedule:
    # Every 5 min between 14:00-23:55 UTC during June-July (WC match windows).
    # GitHub Actions enforces ~5min minimum — as fast as possible.
    - cron: "*/5 14-23 * 6-7 *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Fetch live match events (SofaScore)
        run: python -m scripts.fetch_live_events

      - name: Regenerate dashboard with live data
        run: python -m scripts.generate_html_dashboard

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/live_events.json docs/index.html reports/dashboard.html || true
          git diff --cached --quiet || git commit -m "chore: live update $(date -u +%H:%M UTC)"
          git pull --rebase origin main
          git push
