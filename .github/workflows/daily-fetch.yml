name: daily-fetch

on:
  schedule:
    - cron: "0 6 * * *"   # 06:00 UTC daily
  workflow_dispatch:

concurrency:
  group: wc-pipeline
  cancel-in-progress: false

permissions:
  contents: write
  actions: none
  checks: none
  deployments: none
  id-token: none
  issues: none
  packages: none
  pull-requests: none
  security-events: none
  statuses: none

jobs:
  fetch-and-predict:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install
        run: pip install -e ".[dev]"

      - name: Fetch fixtures
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python -m scripts.fetch_fixtures

      - name: Fetch results
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: python -m scripts.fetch_results

      - name: Fetch Polymarket odds
        run: python -m scripts.fetch_odds

      - name: Fetch WC 2022 xG from StatsBomb (once — skips if file exists)
        run: |
          if [ ! -f data/wc2022_xg.json ]; then
            python -m scripts.fetch_statsbomb_xg
          fi

      - name: Refit model (historical + completed WC results)
        run: python -m scripts.refit_params

      - name: Fit isotonic calibrator from backtest results
        run: python -m scripts.fit_calibrator

      - name: Lock predictions for remaining fixtures
        run: python -m scripts.predict_all_fixtures

      - name: Simulate tournament (winner odds)
        run: python -m scripts.simulate_tournament

      # after simulate_tournament: the README winner-odds block reads
      # tournament.json, so this must run on today's sims, not yesterday's
      - name: Regenerate track record + README
        run: python -m scripts.generate_track_record

      - name: Generate HTML dashboard
        run: python -m scripts.generate_html_dashboard

      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add \
            data/predictions.parquet \
            data/fixtures_2026.parquet \
            data/results.parquet \
            data/params_cache.json \
            data/tournament.json \
            data/polymarket_odds.json \
            data/live_events.json \
            reports/track_record.md \
            reports/dashboard.html \
            docs/index.html \
            README.md || true
          git diff --cached --quiet || \
            git commit -m "chore: daily update $(date -u +%Y-%m-%d)"
          git pull --rebase origin main
          git push
